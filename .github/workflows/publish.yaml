name: publish
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  ACTOR: ${{ github.repository_owner }}

jobs:
  publish:
    name: publish ${{ matrix.app }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: gov
            dockerfile: ./apps/gov/Dockerfile
            image: babyn-yar-gov

          - app: admin
            dockerfile: ./apps/admin/Dockerfile
            image: babyn-yar-admin

          - app: api
            dockerfile: ./apps/api/Dockerfile
            image: babyn-yar-api

    steps:
      - name: set up qemu
        uses: docker/setup-qemu-action@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ACTOR }}
          password: ${{ secrets.PAT }}

      - name: compute short sha
        id: vars
        run: echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: build and push ${{ matrix.app }} image
        uses: docker/build-push-action@v7
        with:
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            API_URL=${{ secrets.API_URL }}
            PUBLIC_API_URL=${{ secrets.PUBLIC_API_URL }}
          secrets: |
            "sentry-org=${{ secrets.SENTRY_ORG }}"
            "sentry-project=${{ secrets.SENTRY_PROJECT }}"
            "sentry-auth-token=${{ secrets.SENTRY_AUTH_TOKEN}}"
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ACTOR }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.ACTOR }}/${{ matrix.image }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
  cleanup:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: prune old images
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          token: ${{ secrets.PAT }}
          image-names: "babyn-yar-*"
          cut-off: 1w
          keep-n-most-recent: 3
          dry-run: false
