name: publish
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  ACTOR: ${{ github.repository_owner }}

jobs:
  build:
    name: build ${{ matrix.app }} ${{ matrix.arch }} image
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - app: gov
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: ./apps/gov/Dockerfile
            image: babyn-yar-gov

          - app: admin
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: ./apps/admin/Dockerfile
            image: babyn-yar-admin

          - app: api
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: ./apps/api/Dockerfile
            image: babyn-yar-api

          - app: gov
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: ./apps/gov/Dockerfile
            image: babyn-yar-gov

          - app: admin
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: ./apps/admin/Dockerfile
            image: babyn-yar-admin

          - app: api
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: ./apps/api/Dockerfile
            image: babyn-yar-api

    steps:
      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ACTOR }}
          password: ${{ secrets.PAT }}

      - name: build and push ${{ matrix.app }} ${{ matrix.arch }} image
        id: build
        uses: docker/build-push-action@v7
        with:
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            API_URL=${{ secrets.API_URL }}
            PUBLIC_API_URL=${{ secrets.PUBLIC_API_URL }}
          secrets: |
            "sentry-org=${{ secrets.SENTRY_ORG }}"
            "sentry-project=${{ secrets.SENTRY_PROJECT }}"
            "sentry-auth-token=${{ secrets.SENTRY_AUTH_TOKEN}}"
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.ACTOR }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.app }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ matrix.arch }}

      - name: export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          if [ -z "$digest" ]; then
            echo "build did not produce a digest" >&2
            exit 1
          fi
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: publish ${{ matrix.app }} image
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - app: gov
            image: babyn-yar-gov

          - app: admin
            image: babyn-yar-admin

          - app: api
            image: babyn-yar-api

    steps:
      - name: download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.app }}-*
          merge-multiple: true

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ACTOR }}
          password: ${{ secrets.PAT }}

      - name: create and push manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.ACTOR }}/${{ matrix.image }}
        run: |
          short_sha="${GITHUB_SHA::12}"
          digests=(*)
          if [ "${digests[0]}" = "*" ]; then
            echo "no digests downloaded" >&2
            exit 1
          fi

          refs=()
          for digest in "${digests[@]}"; do
            refs+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:${short_sha}" \
            "${refs[@]}"
  cleanup:
    needs: merge
    runs-on: ubuntu-latest
    steps:
      - name: prune old images
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          token: ${{ secrets.PAT }}
          image-names: "babyn-yar-*"
          cut-off: 1w
          keep-n-most-recent: 3
          dry-run: false
